<title>Nagpur — Full Dealer Network</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:Arial,sans-serif;display:flex;flex-direction:column;height:100vh;background:#f0f2f5;}

  /* ── HEADER ── */
  #header{background:#0D1B2A;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.4);}
  #header h1{font-size:17px;font-weight:700;}
  #header .meta{font-size:11px;color:#90CAF9;margin-top:2px;}

  /* ── TOGGLE BAR ── */
  #toggleBar{background:#1A2744;padding:8px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
  #toggleBar .tbl{font-size:12px;color:#CFD8DC;font-weight:600;}
  .toggle-wrap{display:flex;align-items:center;gap:8px;background:#0D1B2A;border-radius:24px;padding:3px;}
  .t-btn{padding:5px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .2s;color:#90A4AE;background:transparent;}
  .t-btn.active{background:#1565C0;color:#fff;box-shadow:0 2px 6px rgba(21,101,192,.5);}
  #shapeLegend{margin-left:auto;display:flex;gap:14px;align-items:center;}
  .sl-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#B0BEC5;}
  .sl-circle{width:11px;height:11px;border-radius:50%;background:#90A4AE;}
  .sl-diamond{width:10px;height:10px;background:#90A4AE;transform:rotate(45deg);}

  /* ── FILTER BAR ── */
  #filterBar{background:#fff;padding:8px 16px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;border-bottom:1px solid #ddd;flex-shrink:0;}
  #filterBar .lbl{font-size:11px;font-weight:700;color:#555;margin-right:2px;}
  .chip{display:flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:opacity .2s,transform .1s;user-select:none;}
  .chip:hover{transform:scale(1.04);}
  .chip.off{opacity:.3;}
  .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  #countBadge{margin-left:auto;background:#E3F2FD;color:#1565C0;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;}

  /* ── MAP ── */
  #gmap{flex:1;width:100%;}

  .iw-wrap{font-family:Arial,sans-serif;min-width:195px;padding:2px 0;}
  .iw-name{font-size:14px;font-weight:700;color:#212121;margin-bottom:5px;}
  .iw-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;color:#fff;margin-bottom:7px;}
  .iw-type{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;margin-left:5px;}
  .iw-row{font-size:12px;color:#555;margin:2px 0;display:flex;gap:5px;align-items:flex-start;}
  .iw-row span{color:#888;}
  .iw-parent{font-size:11px;color:#888;margin:3px 0 0 0;font-style:italic;}
  .iw-sales{background:#F5F5F5;border-radius:6px;padding:6px 8px;margin-top:6px;display:flex;gap:10px;font-size:11px;}
  .iw-sales div{text-align:center;}
  .iw-sales .sv{font-weight:700;font-size:13px;color:#212121;}
  .iw-sales .sk{color:#888;font-size:10px;}
</style>
</head>

const OEM_LABEL = {HMSI:'H',HERO:'Hr',BAJAJ:'B',TVS:'T',SUZUKI:'S',RE:'R',VESPA:'V'};
const TYPE_COLORS = {'Main Dealer':'#FFFFFF','Sub Dealer':'#FFD54F','Branch':'#80DEEA'};

// Diamond SVG path (rotated square) for auth counters
const DIAMOND_PATH = 'M 0,-12 L 9,0 L 0,12 L -9,0 Z';

let map, infoWin;
let markerArr = [];   // [{marker, oem, isMain}]
let activeOem = new Set(DEALERS.map(d=>d.oem));
let viewMode  = 'all'; // 'main' | 'all'

function initMap(){
  map = new google.maps.Map(document.getElementById('gmap'),{
    center:{lat:21.145,lng:79.09}, zoom:12,
    mapTypeControl:false, streetViewControl:false, fullscreenControl:true,
    styles:[
      {featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]},
      {featureType:'transit',stylers:[{visibility:'off'}]}
    ]
  });
  infoWin = new google.maps.InfoWindow();

  // Update chip counts (based on all 64)
  const cnt = {};
  DEALERS.forEach(d=>{ cnt[d.oem]=(cnt[d.oem]||0)+1; });
  document.querySelectorAll('.chip').forEach(c=>{
    const oem=c.dataset.oem;
    c.innerHTML = c.innerHTML + ` · ${cnt[oem]||0}`;
  });

  DEALERS.forEach(d=>{
    const isMain = d.type === 'Main Dealer';
    const marker = new google.maps.Marker({
      position:{lat:d.lat, lng:d.lng},
      map,
      title: d.name,
      zIndex: isMain ? 10 : 5,
      icon: isMain ? {
        // Circle for Main Dealers
        path: google.maps.SymbolPath.CIRCLE,
        scale: 11,
        fillColor: d.color, fillOpacity: 1,
        strokeColor: '#ffffff', strokeWeight: 2.5
      } : {
        // Diamond for Sub Dealer / Branch
        path: DIAMOND_PATH,
        scale: 0.85,
        fillColor: d.color, fillOpacity: 0.88,
        strokeColor: '#ffffff', strokeWeight: 2,
        rotation: 0
      },
      label:{
        text: OEM_LABEL[d.oem]||d.oem.charAt(0),
        color:'#fff', fontSize:'8px', fontWeight:'bold'
      }
    });

    marker.addListener('click',()=>{
      const closed = d.dealer.toLowerCase().includes('closed')
        ? '<span style="background:#FF5722;color:#fff;font-size:10px;padding:1px 7px;border-radius:10px;margin-left:6px;">CLOSED</span>' : '';
      const typeBg = d.type==='Main Dealer' ? '#1565C0' : d.type==='Branch' ? '#00838F' : '#F57F17';
      infoWin.setContent(`
        <div class="iw-wrap">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
            <img src="${OEM_LOGOS[d.oem]}" style="width:72px;height:36px;border-radius:5px;object-fit:cover;flex-shrink:0;" alt="${d.oem}"/>
            <div>
              <div class="iw-name">${d.name}${closed}</div>
              <div>
                <span class="iw-badge" style="background:${d.color}">${d.oem} — ${d.oemFull}</span>
                <span class="iw-type" style="background:${typeBg};color:#fff">${d.type}</span>
              </div>
            </div>
          </div>
          <div class="iw-row"><span>📍</span> ${d.locality}, Nagpur</div>
          ${!isMain ? `<div class="iw-parent">Under: ${d.dealer}</div>` : ''}
          <div class="iw-sales">
            <div><div class="sv">${d.cash}</div><div class="sk">Cash</div></div>
            <div><div class="sv">${d.finance}</div><div class="sk">Finance</div></div>
            <div><div class="sv" style="color:#1565C0">${d.total}</div><div class="sk">Total</div></div>
          </div>
        </div>`);
      infoWin.open(map, marker);
    });

    markerArr.push({marker, oem:d.oem, isMain});
  });

  refreshMarkers();
}

function setView(mode){
  viewMode = mode;
  document.getElementById('btnMain').classList.toggle('active', mode==='main');
  document.getElementById('btnAll').classList.toggle('active',  mode==='all');
  refreshMarkers();
}

function tog(el){
  const oem=el.dataset.oem;
  if(activeOem.has(oem)){
    if(activeOem.size===1) return;
    activeOem.delete(oem); el.classList.add('off');
  } else {
    activeOem.add(oem); el.classList.remove('off');
  }
  refreshMarkers();
}

function refreshMarkers(){
  let shown=0;
  markerArr.forEach(({marker,oem,isMain})=>{
    const vis = activeOem.has(oem) && (viewMode==='all' || isMain);
    marker.setVisible(vis);
    if(vis) shown++;
  });
  const total = viewMode==='all' ? DEALERS.length : DEALERS.filter(d=>d.type==='Main Dealer').length;
  document.getElementById('countBadge').textContent = `Showing ${shown} of ${total}`;
}

window.initMap=initMap;
</script>
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDuSZ7iflI-EuKf8mxE8bu-28uCuYZ7dA4&callback=initMap"></script>
</body>
