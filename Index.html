<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nagpur Automobile Dealer Map</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: Arial, sans-serif; display:flex; flex-direction:column; height:100vh; background:#f5f5f5; }
  #header { background:#0D1B2A; color:#fff; padding:12px 20px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  #header h1 { font-size:18px; font-weight:700; }
  #header span { font-size:12px; color:#90CAF9; }
  #legend { background:#fff; padding:10px 16px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; border-bottom:1px solid #ddd; flex-shrink:0; }
  #legend .lem { font-size:11px; font-weight:700; color:#555; margin-right:4px; }
  .legend-item { display:flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; cursor:pointer; border:2px solid transparent; transition:all 0.2s; }
  .legend-item.inactive { opacity:0.35; }
  .legend-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
  #map { flex:1; width:100%; border:0; }
  #count { font-size:11px; color:#78909C; padding:2px 0; align-self:center; margin-left:auto; }
</style>
</head>
<body>
<div id="header">
  <h1>🗺️ Nagpur Automobile Dealer Network</h1>
  <span>27 Authorized Dealers · 7 OEM Brands · Color-Coded</span>
</div>
<div id="legend">
  <span class="lem">Filter by OEM:</span>
  <div class="legend-item" data-oem="HMSI" style="background:#E3F2FD;color:#1565C0;border-color:#1565C0" onclick="toggleOem(this)">
    <span class="legend-dot" style="background:#1565C0"></span>HMSI (Honda) · 5
  </div>
  <div class="legend-item" data-oem="HERO" style="background:#FFEBEE;color:#C62828;border-color:#C62828" onclick="toggleOem(this)">
    <span class="legend-dot" style="background:#C62828"></span>HERO · 5
  </div>
  <div class="legend-item" data-oem="BAJAJ" style="background:#FFF3E0;color:#E65100;border-color:#E65100" onclick="toggleOem(this)">
    <span class="legend-dot" style="background:#E65100"></span>BAJAJ · 3
  </div>
  <div class="legend-item" data-oem="TVS" style="background:#E8F5E9;color:#2E7D32;border-color:#2E7D32" onclick="toggleOem(this)">
    <span class="legend-dot" style="background:#2E7D32"></span>TVS · 6
  </div>
  <div class="legend-item" data-oem="SUZUKI" style="background:#F3E5F5;color:#6A1B9A;border-color:#6A1B9A" onclick="toggleOem(this)">
    <span class="legend-dot" style="background:#6A1B9A"></span>SUZUKI · 5
  </div>
  <div class="legend-item" data-oem="RE" style="background:#EFEBE9;color:#4E342E;border-color:#4E342E" onclick="toggleOem(this)">
    <span class="legend-dot" style="background:#4E342E"></span>Royal Enfield · 3
  </div>
  <div class="legend-item" data-oem="VESPA" style="background:#E0F2F1;color:#00695C;border-color:#00695C" onclick="toggleOem(this)">
    <span class="legend-dot" style="background:#00695C"></span>VESPA · 1
  </div>
  <span id="count">Showing all 27</span>
</div>
<div id="map-container" style="flex:1;position:relative;">
  <iframe id="map"
    src="https://www.google.com/maps/d/embed?mid=1&hl=en&z=12&ll=21.145,79.09"
    style="width:100%;height:100%;border:0;display:none;"
  ></iframe>
  <div id="gmap" style="width:100%;height:100%;"></div>
</div>

<script>
const DEALERS = [
  { name:"Sudarshan Motors", oem:"HMSI", locality:"Civil Lines", lat:21.1530381, lng:79.0788563 },
  { name:"Mascot Honda", oem:"HMSI", locality:"Lakadganj", lat:21.1512623, lng:79.1242297 },
  { name:"Tajshree Autowheels", oem:"HMSI", locality:"Manish Nagar", lat:21.090905, lng:79.0821338 },
  { name:"Sai Point Honda", oem:"HMSI", locality:"Baidyanath Sq.", lat:21.1367936, lng:79.1007477 },
  { name:"Mascot Mobility Honda", oem:"HMSI", locality:"Hingna", lat:21.118636, lng:79.0152494 },
  { name:"Aditya Auto Agencies", oem:"HERO", locality:"Dhantoli", lat:21.140068, lng:79.0909985 },
  { name:"NK Kusumgar & Co.", oem:"HERO", locality:"Bus Stand", lat:21.134945, lng:79.09683 },
  { name:"Gurudev Motor", oem:"HERO", locality:"Khamla", lat:21.1129589, lng:79.0604288 },
  { name:"Khushbu Motors", oem:"HERO", locality:"Kamptee", lat:21.2108556, lng:79.1874827 },
  { name:"Thaparsons Motors", oem:"HERO", locality:"Butibori", lat:20.941507, lng:79.007471 },
  { name:"Patni Automobiles", oem:"BAJAJ", locality:"Sadar", lat:21.158530, lng:79.0826735 },
  { name:"Arun Automobiles", oem:"BAJAJ", locality:"Khamla", lat:21.112101, lng:79.0640217 },
  { name:"I Ride Enterprises", oem:"BAJAJ", locality:"CA Road", lat:21.1479347, lng:79.1334811 },
  { name:"A.K. Gandhi", oem:"TVS", locality:"Dhantoli", lat:21.138472, lng:79.0827054 },
  { name:"Mercury Motors", oem:"TVS", locality:"CA Road", lat:21.1483586, lng:79.1235437 },
  { name:"Indrayani Motors", oem:"TVS", locality:"Suyog Nagar", lat:21.1069435, lng:79.0833319 },
  { name:"Sai Dynamic Motors", oem:"TVS", locality:"Khamla Rd", lat:21.113703, lng:79.0670366 },
  { name:"Zen TVS", oem:"TVS", locality:"Ramdaspeth", lat:21.1447119, lng:79.0677462 },
  { name:"Manyata TVS", oem:"TVS", locality:"Civil Lines", lat:21.1528726, lng:79.0769449 },
  { name:"Rishikesh Motors", oem:"SUZUKI", locality:"Civil Lines", lat:21.1530696, lng:79.0792143 },
  { name:"Jaimal Automobiles", oem:"SUZUKI", locality:"CA Road", lat:21.1486123, lng:79.1214361 },
  { name:"Nangia Automobiles", oem:"SUZUKI", locality:"Dhantoli", lat:21.138570, lng:79.0816779 },
  { name:"Ironik Motors", oem:"SUZUKI", locality:"Trimurti Nagar", lat:21.1113118, lng:79.0673238 },
  { name:"Motonext Pvt Ltd", oem:"SUZUKI", locality:"Automotive Sq.", lat:21.1856381, lng:79.1139808 },
  { name:"Paragon Traders", oem:"RE", locality:"Sitabuldi", lat:21.1404231, lng:79.0854979 },
  { name:"Ved Motors", oem:"RE", locality:"Amravati Rd", lat:21.173313, lng:79.1010836 },
  { name:"Shri Krishna Automobiles", oem:"RE", locality:"CA Road", lat:21.148263, lng:79.125576 },
  { name:"Devkule Motors", oem:"VESPA", locality:"Ghat Road", lat:21.138260, lng:79.0894809 },
];

const OEM_COLORS = {
  HMSI:   "#1565C0",
  HERO:   "#C62828",
  BAJAJ:  "#E65100",
  TVS:    "#2E7D32",
  SUZUKI: "#6A1B9A",
  RE:     "#4E342E",
  VESPA:  "#00695C",
};

const OEM_FULL = {
  HMSI:"Honda (HMSI)", HERO:"Hero MotoCorp", BAJAJ:"Bajaj Auto",
  TVS:"TVS Motor", SUZUKI:"Suzuki Motorcycle", RE:"Royal Enfield", VESPA:"Vespa / Aprilia"
};

let map, markers = [], activeOems = new Set(Object.keys(OEM_COLORS)), infoWindow;

function initMap() {
  map = new google.maps.Map(document.getElementById("gmap"), {
    center: { lat: 21.145, lng: 79.09 },
    zoom: 12,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: true,
    styles: [
      { featureType:"poi", elementType:"labels", stylers:[{visibility:"off"}] },
      { featureType:"transit", stylers:[{visibility:"off"}] }
    ]
  });
  infoWindow = new google.maps.InfoWindow();

  DEALERS.forEach((d, i) => {
    const color = OEM_COLORS[d.oem];
    const marker = new google.maps.Marker({
      position: { lat: d.lat, lng: d.lng },
      map: map,
      title: `${d.name} | ${d.oem}`,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 10,
        fillColor: color,
        fillOpacity: 1,
        strokeColor: "#ffffff",
        strokeWeight: 2,
      },
      label: { text: d.oem.charAt(0), color: "#fff", fontSize: "9px", fontWeight: "bold" }
    });

    marker.addListener("click", () => {
      infoWindow.setContent(`
        <div style="font-family:Arial;min-width:180px;padding:4px 0">
          <div style="font-size:14px;font-weight:700;color:#212121;margin-bottom:4px">${d.name}</div>
          <div style="display:inline-block;background:${color};color:#fff;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;margin-bottom:6px">${d.oem} — ${OEM_FULL[d.oem]}</div>
          <div style="font-size:12px;color:#555;margin-top:4px">📍 ${d.locality}, Nagpur</div>
        </div>
      `);
      infoWindow.open(map, marker);
    });
    markers.push({ marker, oem: d.oem });
  });
}

function toggleOem(el) {
  const oem = el.dataset.oem;
  if (activeOems.has(oem)) {
    if (activeOems.size === 1) return; // keep at least one
    activeOems.delete(oem);
    el.classList.add("inactive");
  } else {
    activeOems.add(oem);
    el.classList.remove("inactive");
  }
  let shown = 0;
  markers.forEach(({ marker, oem: mo }) => {
    const vis = activeOems.has(mo);
    marker.setVisible(vis);
    if (vis) shown++;
  });
  document.getElementById("count").textContent = `Showing ${shown} of 27`;
}

window.initMap = initMap;
</script>
<script async defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDuSZ7iflI-EuKf8mxE8bu-28uCuYZ7dA4&callback=initMap">
</script>
</body>
</html>
